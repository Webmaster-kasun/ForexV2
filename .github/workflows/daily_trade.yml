name: Multi-Pair Bot — GBP/USD EUR/USD AUD/USD

on:
  schedule:
    # AUD/USD Asia session: 07:00-10:00 SGT = 23:00-02:00 UTC
    - cron: "*/5 23 * * 0-4"    # Sun-Thu 23:xx UTC (Mon-Fri 07:xx SGT)
    - cron: "*/5 0-1 * * 1-5"   # Mon-Fri 00:xx-01:xx UTC (08:xx-09:xx SGT)

    # London session: 15:00-19:00 SGT = 07:00-11:00 UTC
    - cron: "*/5 7-10 * * 1-5"  # Mon-Fri 07:xx-10:xx UTC (15:xx-18:xx SGT)

    # NY session: 20:00-00:00 SGT = 12:00-16:00 UTC
    - cron: "*/5 12-15 * * 1-5" # Mon-Fri 12:xx-15:xx UTC (20:xx-23:xx SGT)

    # Daily state reset at SGT midnight = 16:00 UTC
    - cron: "0 16 * * 1-5"      # Mon-Fri 16:00 UTC = 00:00 SGT

  workflow_dispatch:             # Manual trigger anytime

jobs:
  trade:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore bot state
        uses: actions/cache@v4
        with:
          path: bot_state.json
          key: multipair-state-${{ github.run_number }}
          restore-keys: |
            multipair-state-

      - name: Run bot
        env:
          OANDA_API_KEY:    ${{ secrets.OANDA_API_KEY }}
          OANDA_ACCOUNT_ID: ${{ secrets.OANDA_ACCOUNT_ID }}
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py

      - name: Save logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: multipair-logs-${{ github.run_number }}
          path: |
            *.log
            bot_state.json
          retention-days: 14
