name: GBP/USD Scalp Bot - Cable Scalp

on:
  schedule:
    - cron: "*/5 22-23 * * 0"   # Sunday 22:00-23:59 UTC = Mon 06:00-07:59 SGT (Asian Pre-London)
    - cron: "*/5 * * * 1-4"     # Mon-Thu all day UTC (covers all 4 sessions)
    - cron: "*/5 0-15 * * 5"    # Friday up to 15:00 UTC = 23:00 SGT (market close)
  workflow_dispatch:             # Manual trigger anytime

jobs:
  trade:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Scalp Bot
        env:
          OANDA_API_KEY:    ${{ secrets.OANDA_API_KEY }}
          OANDA_ACCOUNT_ID: ${{ secrets.OANDA_ACCOUNT_ID }}
          TELEGRAM_TOKEN:   ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py

      - name: Save logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scalp-bot-logs-${{ github.run_number }}
          path: |
            *.log
            trades_*.json
          retention-days: 30
